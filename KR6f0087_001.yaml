body:
  text: 慧淨述阿彌陀經此云無量壽後秦羅什師元譯小無量壽元壽求那陀法師重譯竊以法身無像像因有像之機淨土無方方因有方之感雖復至理凝寂道絶名言大悲善巧隨三轉醍醐塵沙出俗契之者必同其本化之者或異其流是以彌陀種覺居妙剎以弘道釋迦能仁處娑婆以接物淨土之內根就易調穢國之中剛強難化開三因以運四生布九品而摧五痛六方諸佛現於三千證得往生言無虛妄緣衆生空而不捨大悲觀如來寂而不失敬養雖知佛寂如空而現種種清淨佛土可謂不壞假名而説諸法實相不動而建立諸法者佛説阿彌陀經者乃勸生淨土不退菩提者也皎三明以像秋月振四辨而類春雷讚淨境以示西方美勝因而指東土班自我口暢之彼心以覺合機故稱佛説阿彌陀此云無量壽光明説法徒衆皆悉無量為引物情偏標壽名故名無量經有二義訓經訓常衆聖所遊曰經古經今恆定曰常故名佛説阿彌陀經如是至給孤獨園者述曰經開三分一由序二正體三流通三分例各二由序二者一者通序證信二者別序發起正體二者一安樂淨土因果二彌陀法身因果流通二者一如來説此經已二大衆歡喜信受通別二序例各有六通序六者一信成二聞成三時成四主成五處成六衆成別序六者至下文當釋今通序六中五成就也如是則信成也如是者信順之辭信則所言之理順順則師資之道成經無豐約非信不傳故名如是又如則指法是則定辭如佛所説一切皆是故名如是故如是又信則信此經下文云六方諸佛恆沙種覺現相證成念阿彌陀佛定生淨土經初如是示信經後歡喜示智信為能入智為能度進念定三網羅始終五根具足堪受堪傳故云如是我聞者聞成也親承曰我聞傳授曰所聞此則親承音旨謂阿難親從佛邊聞説阿彌陀佛極樂國土若有專念定得生生無傳聞之謬阿難未為侍者前非親承而言我聞者佛臨涅槃時更為略説故得稱我聞也一時者時成也佛説此阿彌陀經時舍利弗阿難等聽受時又法王啓運嘉集之時故曰一時佛者此云覺則主成也説法五人一佛説二弟子説三諸天説四神仙説五變化説今是佛説故名主成就佛是大師之名以覺為義覺有二一覺察二覺悟悟則智障盡察則煩惱障除於二覺而有三異自覺異凡夫覺他異二乘覺滿異菩薩三者備矣爰佛名焉在者處成也在亦云住住有八今略有二一境界住二依止住在舍衛國祇樹給孤獨園者出二住境界為化在俗之徒園是依止之處為接出家衆祇陀太子云戰勝太子載誕之時王破敵軍之賊宮人聞奏因以為名給孤獨本須達此云善慈內外慈而富賑貧而恤寡鄉人美之因以號焉人有上下不可先稱獨園園總樹別不可俱言祇樹二人同心共造精舍含為名故云祇樹給孤獨園法身實無棲詑示化有方假住此處説阿彌陀五門修行定得往生五門者故往生論云一禮拜門二讚歎門三作願門四觀察門五回向門與大比丘衆至諸大弟子述曰衆成也衆有三一聲聞衆二菩薩衆三諸天衆此聲聞衆有五一標類二唱數三贊德四列名五結定與大比丘者標類也與者亦名共四乳身自兼彼目之為共智度論云共一戒一見一處等名共大者梵云摩訶此有三義一大二多三斷故人天王等人所恭敬故云何多數至千二百五十人十六外道論議能破故比丘略有三義一怖魔二乞士三破惡此三即初中後也怖魔者夫創軌玄門即建降魔之志故前剃髮染衣時天魔宮動而魔怖也乞士者身為道器身安即道隆故已沾法服乞食以資身也破惡者然聖人道長凡夫道消所修已滿破惡以證果也本覺地三名為至果地轉怖魔為殺賊改乞士為應供説破惡為不生僧者此云衆也多比丘一處和合故名為衆也千二百五十人俱者唱數也皆是大阿羅漢者贊德也羅漢三義如上比丘果地三名應知衆所知識者人天大衆所共知其內德識外形也長老舍利弗至阿䨲樓馱者列名也明列聲聞衆中十七人長老慧命淨命等並稱贊之謂舍利弗此云身子鈍若有邊則段陀利若有邊則身子告往知來雄才隼夾神慧悟目連此云讚誦迦葉此云飲光俱絺羅此云大膝周利槃陀迦此云蛇奴難陀此云慶喜阿難此云歡喜羅睺此云覆障憍梵波提此云牛王賓頭盧此云上座頗羅墮此云利根迦留陀夷此云黑色劫賓那此云房宿薄俱羅此云善容阿䨲樓馱此云如意如是等諸大弟子結定也并諸菩薩至如是等諸大菩薩者述曰菩薩衆也有三初標類次列名後結定菩薩名覺士覺義有四一應覺二正覺三覺分四全覺土有二訓一治二事以此覺事治化衆生故云覺士摩訶大覺士真諦云為約位言之地前十信十解十行名菩薩自利回向名摩訶薩利他也登地已上七地已還名菩薩八地已上名摩訶薩地論云大義有三一願大二行大三利益大文殊下列名也文殊師利此云妙德法王子當繼尊位阿逸多此云無能勝也乾陀訶提此云赤色常精進身心修道如救頭燃也與如是等菩薩者結定也及釋提桓因至諸天大衆俱者述曰下列諸天衆具足應云釋提桓因陀羅因陀羅此云主提桓此云天釋迦此云能總名能天主等者等餘通序下明發起別序有六一扣機二指處三數量四依報五正果六弘化扣機即佛告舍利弗指處則示在西方數量則過十萬億佛土依報則極樂世界正果即有佛號阿彌陀弘化則現在説法舍利弗彼土何故名極樂者述云下明正宗略二中五廣十略二者一淨土因果二法身因果中五者一明極樂彌陀不退之果二明發願起行勸修其因三明六方諸佛現相證成四明諸佛既證令修獎樂五明二土世尊現相贊德廣十者一安樂依報二者彌陀正果三發願往生四往生之行五諸佛現相六釋相所由七三時願因八三生行果九此佛贊彼十彼佛贊此今依後判即為十章第一明極樂依報有二一問二答此問也其國衆生無有衆苦至故名極樂者答也有二初標宗略答後開宗廣釋此標宗略答也彼阿彌陀國無有衆苦唯有樂事一生彼土橫截五道超出三界至不退轉當初僧祇萬劫修行十住毗婆沙論云修道有二一難行二易行此土修道名曰難行西方修道名曰易行如跛人步行陸路即苦跛人乘船水路即樂又舍利弗極樂國土七重欄楯至名為極樂者述曰下明開宗廣釋有五一明寶欄楯林嚴二明寶池華光嚴三明寶樂神通嚴四明寶鳥法音嚴五明寶樹搖風嚴此是第一寶欄楯林嚴有六一寶欄二寶楯三寶羅林六寶樹嚴欄持內德楯防外羅網誓以珠繩無漏法芝林西方功德法莊嚴國界也又舍利弗極樂國至功德莊嚴者述曰第二寶池華光嚴有八一寶池二寶水三寶階四寶道五寶樓六寶閣七寶華八寶光嚴等池則八解之浴池水則八德之香水樓則八定之高樓閣則三空之重閣華則七淨之覺華光則智慧之光明能破疑生之愚暗又舍利弗常作天樂至功德莊嚴者述曰第三寶樂神通嚴有三一明作樂雨華二明應供諸佛三明結嚴成就天即六時而雨四華人即十方而供萬佛旭旦則彼供養食時即從彼到此經行復次舍利弗彼國常有種種之鳥至變化所作者述曰第四寶衆鳥法音嚴有六一總標瑞鳥二別指其名三歌詠法音四聞念三寶五破除疑執六顯不思議種種奇妙雜色鳥者總標祥瑞異色之鳥也白鵠孔雀共命之鳥者別指其名略敘七鳥之名也六時演暢根力覺道等法者歌詠法佛常六時觀六道衆生鳥亦六時歌詠道品也其土衆生聞是音已皆念佛法僧者明聞者利益也舍利弗汝勿謂此鳥實是罪報所生至何況有實者此破遣情疑初牒疑意所以下釋彼土尚無三惡之名況有三惡之義也是諸至變化所作者此顯不思議是諸鳥者乃是彌陀化作令宣法音莊嚴國界利益衆生也舍利弗彼佛國土微風吹動至如是莊嚴者述曰第五寶樹搖風嚴有四一風搖樹響二如天樂音三聞念三歸四結嚴成就微風吹動諸寶行樹者風搖寶樹即法説妙音也譬如百千種樂音如天樂音則譬説妙音也聞者同時念佛法僧者明聞念三歸則聞者利益也成就如是功德者結嚴成就也舍利弗於汝意至阿彌陀者述曰下明第二彌陀正報有四一問二答三結四判位此問何故名阿彌陀也舍利弗彼佛光明者述曰此答也答有三一光明二壽命三徒衆此光明無量也又舍利弗壽命至於今十劫者述云此明壽命無量初通次別通則其衆壽命無量別則唯論彌陀壽命壽雖十劫然世間不可數知故名無量壽又舍利弗彼佛有無量無邊至諸菩薩亦如是者述云明徒衆徒衆有二一聲聞衆則四向四果二菩薩衆則五十二賢俱雨權實之威齊柄乘之理舍利弗至成就如是功德莊嚴者述曰此略結也光明壽命菩薩聲聞人法雖殊皆算數所不能及故名無量從本為名故無量壽又舍利弗極樂國土衆生生者至阿僧祇劫説者述云次明判位有三意一彼土即阿鞞跋致此明因強二多有補處大士此明緣勝三阿僧祇劫説此明衆大舍利弗衆生聞者應當發願至俱會一處者述云下明第三發願往生初標次釋情無勝期半路取證標心極果中不牽生舍利弗不可以少善福德因緣得生彼國者述云下明第四往生之行初標次釋後結此標行也將明久種善根生故言不少舍利弗若善男子善女人聞阿彌陀佛名至極樂國土生者述云釋行也有五一條機二名本三時分四彼佛此迎五此生彼條機則男子女人名本則阿彌陀佛時分則七日一心彼佛此迎則彌陀聖衆垂終迎接此生生彼則心不顛倒即得往生也舍利弗我見此利至發不可思議功德者述云結也初結前願次結後行一生彼土必登不退橫截五道直超三界生死之河雖暗不久超度涅槃之道雖遠且亦可登故云見是利也舍利弗如我今者讚嘆不可思議功德之利者此結後行亦是調前起後相證成也東方亦有阿閦毗佛乃至上方佛所護念經者述云第五明六方諸佛現相證誠六方即四方上下示證佛處也諸佛則三世三身恆沙種覺明證佛人也現相則舒舌遍滿三千明證相也證誠則説誠實言者即證成教也文有六方則為六重一一方中例皆有四東方四者一證處則東方二證人則阿閦毗等恆沙諸佛三證相舌遍三千四證教則當信是經弟子説經引弟子為證諸佛説經以諸佛為證故引六方恆沙諸佛舒舌實語念彌陀一生定得往彼極樂世界至不退轉餘五方四門類可知舍利弗於汝意云何至護念經者述曰下明第六釋相所由初問後答此問也舍利弗若善男子善女人至三菩提者述云答也但聞此經名彌陀及諸佛號能持不忘者一切佛護不退轉菩提是故舍利弗汝等當信受我語及諸佛所説者述曰明第七三時願因文有二一敕聽信受二正明三時願因此敕聽信受也我語者釋迦勸生淨土也諸佛説者六方恆沙諸佛勸證往生舍利弗若有人已發願至三菩提者述云正明三時願也已發願者觀音勢至龍樹之流今發願者現今信受之輩當發願者未來信生之類欲生阿彌陀佛國者三時願所生處也得不退菩提者一生彼處地勝緣強必階不退無上菩提也於彼國土至生彼國土者述云下明第八三生行果也已生者觀音勢至之流今生者現今信受之輩當生者未來信受生之類也既前賢後聖皆願生彼見賢思齊故有信者應當發願生彼國也諸佛所以殷勤只勸歸西方定獲不退舍利弗如我今者至不思議功德者述曰下明第九此佛讚彼謂釋迦如來讚阿彌陀諸佛淨土之果彼諸佛等至甚難希有之事述曰下次第十明彼佛讚此釋迦穢土道成能為難事難事即五濁惡世教化衆生信歸淨土定證不退文有三重一標二釋三結標即甚難希有之事甚難則三章二釋則五濁菩提之事三結則還結此三義此則標也初總次別總即明彼佛禪我功德別則甚難希有之事甚難則五濁惡世希有之事則無上菩提之事即為衆説為衆説即穢土修因得淨土果此是難證之法能於娑婆國土至難信之法者述曰釋三章五濁者釋甚難章門得菩提者釋希有章門為衆生説者釋之事章門也舍利弗當知我於至是為甚難述曰結三章也五濁得菩提者二門結自利也為一切世間説者一門結利他也佛説此經已至歡喜信受者述曰明流通兩聖對揚四部蒙益深心歡喜信受奉行
